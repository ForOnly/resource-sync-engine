# Resource Sync Engine — Configuration
#
# Each entry under "resources" describes a single resource to
# synchronize. The sync engine will:
#   1. Download the resource from the given URL.
#   2. If the local file does not exist, create it.
#   3. If the local file exists, compare its hash.
#   4. If the hash differs, update the file.
#   5. If the hash matches, skip it.
#
# All ${VARIABLE} references are replaced with environment variables
# at runtime.

resources:
  # ──────────────────────────────────────────────
  # Example 1: A simple resource with default settings
  # ──────────────────────────────────────────────
  - name: "example-json"
    url: "https://example.com/data.json"
    path: "data/example.json"
    algorithm: "sha256"

  # ──────────────────────────────────────────────
  # Example 2: A resource with custom headers and env vars
  # ──────────────────────────────────────────────
  - name: "example-blocklist"
    url: "https://cdn.example.com/blocklist.txt"
    path: "data/blocklist.txt"
    algorithm: "sha1"
    headers:
      Authorization: "Bearer ${API_TOKEN}"
    timeout: 60
    retry: 5

  # ──────────────────────────────────────────────
  # Example 3: A large resource with a size limit
  # ──────────────────────────────────────────────
  - name: "geoip-database"
    url: "https://cdn.example.com/geoip.mmdb"
    path: "data/geoip.mmdb"
    algorithm: "md5"
    max_size: 104857600  # 100 MB

  # ──────────────────────────────────────────────
  # Example 4: Resource with custom output directory via env var
  # ──────────────────────────────────────────────
  - name: "custom-output"
    url: "https://example.com/config.ini"
    path: "${OUTPUT_DIR}/config.ini"
    algorithm: "sha256"
    timeout: 30
    retry: 3