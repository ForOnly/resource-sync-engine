# Resource Sync Engine — GitHub Actions workflow
#
# Runs every 6 hours on a schedule. Supports manual trigger via
# workflow_dispatch. Automatically commits and pushes any resource
# changes. If no resources changed, no commit is made.
#
# Required secrets:
#   - None by default. If your config references ${TOKEN} or similar
#     env vars, add them as GitHub Actions secrets and pass them below.

name: Resource Sync

on:
  schedule:
    # Every 6 hours at minute 0
    - cron: "0 */6 * * *"
  workflow_dispatch:
  # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  sync:
    name: Sync Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run resource sync
        run: python -m resource_sync -c config.yaml
        env:
          # Add your custom environment variables here:
          # API_TOKEN: ${{ secrets.API_TOKEN }}
          # HOST: ${{ secrets.HOST }}
          # OUTPUT_DIR: ${{ secrets.OUTPUT_DIR }}
          GITHUB_ACTIONS: "true"